<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#000"/>
<title>Brish & Monko: Smash & Bloom</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;font-family:'Fredoka',system-ui,sans-serif}
#canvas1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:100%;max-height:100%}
#playerImage,#playerImage2,#enemyImage,#backgroundImage{display:none}
.hero-switch{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
.hero-switch button{padding:8px 18px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.5);color:#fff;font-family:'Fredoka',sans-serif;font-size:15px;font-weight:600;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.hero-switch button.active{border-color:#7c4dff;background:rgba(124,77,255,.3)}
</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<img id="playerImage" src="images/brish_player.png"/>
<img id="playerImage2" src="images/monko_player.png"/>
<img id="enemyImage" src="images/enemy_1.png"/>
<img id="backgroundImage" src="images/background_single.png"/>
<div class="hero-switch">
  <button class="active" onclick="switchHero('brish',this)">🥊 Brish</button>
  <button onclick="switchHero('monko',this)">🌸 Monko</button>
</div>
<script src="script.js"></script>
</body>
</html>
